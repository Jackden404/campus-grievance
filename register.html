<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-endpoint" content="php/csrf_token.php">
    <meta name="description" content="Register for the Campus Grievance Portal to start submitting and tracking complaints.">
    <title>User Registration | Campus Grievance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="page-soft-bg">

<nav class="navbar navbar-dark top-nav">
    <div class="container py-2">
        <a href="index.html" class="navbar-brand fw-semibold">Campus Grievance Portal</a>
        <div class="d-flex gap-2">
            <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
            <a href="track_status.html" class="btn btn-outline-light btn-sm">Track Status</a>
        </div>
    </div>
</nav>

<main class="auth-wrap">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-9 col-lg-6">
                <div class="card auth-card">
                    <div class="auth-head">
                        <h3 class="h4 mb-1 fw-bold">Create Your Account</h3>
                        <p class="mb-0 small">Register to get started with the portal.</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="php/register.php" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">
                                    <i class="bi bi-person me-1" style="color:var(--accent);"></i> Full Name
                                </label>
                                <input id="name" type="text" name="name" class="form-control" placeholder="Your full name" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope me-1" style="color:var(--accent);"></i> Email Address
                                </label>
                                <input id="email" type="email" name="email" class="form-control" placeholder="name@college.edu" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">
                                    <i class="bi bi-lock me-1" style="color:var(--accent);"></i> Password
                                </label>
                                <input id="password" type="password" name="password" class="form-control" placeholder="Create a secure password" required>
                            </div>

                            <button class="btn btn-primary w-100">
                                <i class="bi bi-person-plus me-1"></i> Create Account
                            </button>
                        </form>

                        <p class="text-center mt-3 mb-0" style="font-size:0.875rem;color:var(--ink-60);">
                            Already registered? <a href="login.html" class="text-decoration-none fw-semibold" style="color:var(--accent);">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="assets/js/csrf.js"></script>
</body>
</html>
