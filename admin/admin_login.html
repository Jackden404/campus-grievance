<body class="page-soft-bg">

<nav class="navbar navbar-dark top-nav">
    <div class="container py-2">
        <a href="../index.html" class="navbar-brand fw-semibold">Campus Grievance Portal</a>
        <a href="../login.html" class="btn btn-outline-light btn-sm">User Login</a>
    </div>
</nav>

<main class="auth-wrap">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card auth-card">
                    <div class="auth-head">
                        <h3 class="h4 mb-1 fw-bold">
                            <i class="bi bi-shield-lock me-2" style="opacity:0.7;"></i>Admin Access
                        </h3>
                        <p class="mb-0 small">Sign in with administrator credentials to continue.</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="admin_login.php" method="post">
                            <div class="mb-3">
                                <label for="adminUser" class="form-label">
                                    <i class="bi bi-person-badge me-1" style="color:var(--accent);"></i> Admin Username
                                </label>
                                <input type="text" id="adminUser" name="username" class="form-control" placeholder="Enter username" required>
                            </div>

                            <div class="mb-4">
                                <label for="adminPass" class="form-label">
                                    <i class="bi bi-lock me-1" style="color:var(--accent);"></i> Password
                                </label>
                                <input type="password" id="adminPass" name="password" class="form-control" placeholder="Enter password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In as Admin
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
