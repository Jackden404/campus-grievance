<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Track the status of your submitted campus complaint by email.">
    <title>Track Complaint Status | Campus Grievance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="page-soft-bg">

<nav class="navbar navbar-dark top-nav">
    <div class="container py-2">
        <a href="index.html" class="navbar-brand fw-semibold">Campus Grievance Portal</a>
        <div class="d-flex gap-2">
            <a href="submit_complaint.html" class="btn btn-outline-light btn-sm">Submit Complaint</a>
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
        </div>
    </div>
</nav>

<main class="track-wrap">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-9 col-lg-6">
                <div class="card track-card">
                    <div class="track-head">
                        <h3 class="h4 mb-1 fw-bold">
                            <i class="bi bi-search me-2" style="opacity:0.7;"></i>Track Your Complaint
                        </h3>
                        <p class="mb-0 small">Enter your registered email to view all related complaints.</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="php/track_status.php" method="post">
                            <div class="mb-4">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope me-1" style="color:var(--accent);"></i> Registered Email
                                </label>
                                <input id="email" type="email" name="email" class="form-control" placeholder="name@college.edu" required>
                            </div>

                            <button class="btn btn-primary w-100">
                                <i class="bi bi-activity me-1"></i> Track Status
                            </button>
                        </form>

                        <div class="helper p-3 mt-4">
                            <span class="fw-semibold" style="color:var(--ink-80);">
                                <i class="bi bi-info-circle me-1" style="color:var(--accent);"></i>Note:
                            </span>
                            Use the same email address you used while submitting your complaint.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="assets/js/csrf.js"></script>
